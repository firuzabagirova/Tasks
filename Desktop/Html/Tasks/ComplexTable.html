<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="ComplexTable.css">
</head>
<body>
    <main>
        <section>
            <table>
                <thead>
                   <td><p>A more complex table-within-a table</p></td> 
                </thead>
                <tbody>
                    <tr>
                        <td>Outer Table</td>
                    </tr>
                    <tr>
                    <td>
                        <table>
                            <thead>
                                <td><p>An inner table showing a variety of headings and data items</p></td>
                            </thead>
                            <tbody>
                                <tr><td>Inner Table</td></tr>
                            </tbody>
                        </table>
                    </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
